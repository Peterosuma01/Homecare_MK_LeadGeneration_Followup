<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Steelwool Africa LTD - Lead Management</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SWAL Leads">
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; display:flex; justify-content:center; align-items:center; }
    .container { background:white; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,0.3); max-width:760px; width:100%; padding:28px; }
    .header { text-align:center; margin-bottom:18px; padding-bottom:12px; border-bottom:3px solid #667eea; }
    h1 { color:#333; font-size:22px; margin-bottom:4px; }
    .subtitle { color:#666; font-size:14px; }
    .form-group { margin-bottom:14px; }
    label { display:block; margin-bottom:8px; color:#333; font-weight:600; font-size:13px; }
    input[type="text"], input[type="password"], input[type="email"], input[type="number"], select { width:100%; padding:10px 12px; border:2px solid #e1e8ed; border-radius:8px; font-size:13px; background:white; }
    .section-title { color:#667eea; font-size:16px; font-weight:700; margin-top:18px; margin-bottom:10px; padding-bottom:6px; border-bottom:2px solid #f0f0f0; }
    .btn { width:100%; padding:12px; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; }
    .btn.small { width:48%; padding:10px; font-size:13px; }
    .btn-row { display:flex; gap:8px; }
    .message { padding:12px; border-radius:8px; margin-top:14px; display:none; font-size:13px; }
    .message.success { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
    .message.error { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
    .message.info { background:#d1ecf1; color:#0c5460; border:1px solid #bee5eb; }
    .message.show { display:block; }
    .loading { display:none; text-align:center; color:#667eea; font-size:13px; margin-top:8px; }
    .loading.show { display:block; }
    .meta { font-size:12px; color:#666; margin-top:6px; }
    .details-table { width:100%; border-collapse:collapse; margin-top:12px; }
    .details-table th, .details-table td { padding:10px 12px; border-bottom:1px solid #f0f0f0; text-align:left; font-size:13px; }
    .details-table th { background:#fafafa; font-weight:700; color:#333; width:40%; }
    .small-muted { font-size:12px; color:#666; margin-top:6px; }
    .hidden { display:none; }
    .field-inline { display:flex; gap:8px; align-items:center; }
    .field-inline > * { flex:1; }
    .offline-banner { background:#ffc107; color:#333; padding:8px; text-align:center; border-radius:8px; margin-bottom:15px; font-size:12px; display:none; }
    .offline-banner.show { display:block; }
    @media (max-width:640px) { .btn-row { flex-direction:column; } .btn.small { width:100%; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="offline-banner" id="offlineBanner">⚠️ You are offline. Please check your connection.</div>
    
    <div class="header">
      <h1>Steelwool Africa LTD</h1>
      <p class="subtitle">Lead Generation Follow-up System</p>
    </div>

    <form id="leadForm">
      <div class="form-group">
        <label for="roleSelect">Select Role *</label>
        <select id="roleSelect" required>
          <option value="">-- Select Role --</option>
          <option value="Supervisor">Supervisor</option>
          <option value="SalesRep">Sales Representative</option>
        </select>
      </div>

      <div id="salesRepAuthSection" class="hidden">
        <div class="form-group">
          <label for="salesRepEmailAuth">Sales Rep Email *</label>
          <input type="email" id="salesRepEmailAuth" placeholder="salesrep@example.com">
        </div>
        <div class="form-group">
          <label for="salesRepPasswordAuth">Sales Rep Password *</label>
          <input type="password" id="salesRepPasswordAuth" placeholder="Enter your password">
        </div>
      </div>

      <div class="form-group">
        <label for="customerCode">Customer Code *</label>
        <div class="field-inline">
          <input type="text" id="customerCode" required placeholder="Enter customer code">
          <button type="button" id="loadBtn" class="btn small" style="width:auto;padding:10px 14px;">Load</button>
        </div>
      </div>

      <div id="detailsSection" class="hidden">
        <div class="section-title">Customer Details</div>
        <div style="overflow-x:auto;">
          <table class="details-table" id="detailsTable">
            <tbody id="detailsTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="section-title">Qualification</div>
      <div class="form-group">
        <select id="qualification">
          <option value="">-- Select Status --</option>
          <option value="YES">YES</option>
          <option value="NO">NO</option>
          <option value="Volume Too Small">Volume Too Small</option>
          <option value="Bad Previous History">Bad Previous History</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="btn-row">
        <button type="button" id="approveBtn" class="btn small" style="background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%); display:none;">Approve</button>
        <button type="button" id="declineBtn" class="btn small" style="background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%); display:none;">Decline</button>
      </div>

      <div class="section-title">Presentation</div>
      <div class="form-group">
        <select id="presentation">
          <option value="">-- Select Status --</option>
          <option value="YES">YES</option>
          <option value="Refused to Trade">Refused to Trade</option>
          <option value="Refuse to Provide KYC">Refuse to Provide KYC</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="section-title">KYC Onboarding</div>
      <div class="form-group">
        <select id="kycOnboarding">
          <option value="">-- Select KYC Status --</option>
          <option value="YES">YES</option>
          <option value="NO">NO</option>
          <option value="Pending">Pending</option>
        </select>
      </div>

      <div id="salesRepEmailContainer" class="form-group hidden">
        <label for="salesRepEmail">Sales Rep Email</label>
        <input type="email" id="salesRepEmail" placeholder="salesrep@example.com">
      </div>

      <button type="submit" class="btn" id="submitBtn">Submit</button>

      <div class="loading" id="loading">Processing...</div>
      <div class="message" id="message"></div>
    </form>
  </div>

  <script>
    // ========== CONFIGURATION ==========
    // IMPORTANT: You MUST deploy your Google Apps Script as a Web App
    // and set "Execute as: Me" and "Who has access: Anyone"
    // Then copy the URL here:
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHKyPOx-80IHPmAPV3JehaNJDhjWlR3aE4wwGgyNd-FUzPsNUJnQU25_9k1DN6oSAN/exec';
    
    // ========== STATE ==========
    let currentLoadedLead = null;
    let isSupervisorAuthenticated = false;
    let supervisorPasswordCached = '';
    
    // ========== DOM ELEMENTS ==========
    const roleSelect = document.getElementById('roleSelect');
    const loadBtn = document.getElementById('loadBtn');
    const customerCodeInput = document.getElementById('customerCode');
    const qualificationSelect = document.getElementById('qualification');
    const presentationSelect = document.getElementById('presentation');
    const kycSelect = document.getElementById('kycOnboarding');
    const approveBtn = document.getElementById('approveBtn');
    const declineBtn = document.getElementById('declineBtn');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const message = document.getElementById('message');
    const detailsSection = document.getElementById('detailsSection');
    const detailsTableBody = document.getElementById('detailsTableBody');
    const salesRepEmailContainer = document.getElementById('salesRepEmailContainer');
    const salesRepEmailInput = document.getElementById('salesRepEmail');
    const salesRepAuthSection = document.getElementById('salesRepAuthSection');
    const salesRepEmailAuth = document.getElementById('salesRepEmailAuth');
    const salesRepPasswordAuth = document.getElementById('salesRepPasswordAuth');
    const offlineBanner = document.getElementById('offlineBanner');
    
    function showMessage(text, type) {
      message.className = `message ${type} show`;
      message.textContent = text;
      setTimeout(() => message.classList.remove('show'), 5000);
    }
    
    // ========== GOOGLE APPS SCRIPT API CALL (Using Google.script.run alternative) ==========
    // Since we can't use google.script.run on GitHub Pages, we use fetch with CORS
    // But Google Apps Script requires special handling
    
    async function callGoogleScript(action, params = {}) {
      return new Promise((resolve, reject) => {
        // Create a form data object
        const formData = new FormData();
        const data = { action, ...params };
        formData.append('data', JSON.stringify(data));
        
        // Use fetch with no-cors mode and form data
        fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: formData
        }).then(() => {
          // With no-cors, we can't read the response
          // So we assume success and rely on the server
          resolve({ success: true });
        }).catch(error => {
          reject(error);
        });
      });
    }
    
    // Alternative: Use JSONP approach (more reliable)
    function callGoogleScriptJSONP(action, params = {}, callback) {
      const callbackName = 'callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      const data = { action, ...params, callback: callbackName };
      
      window[callbackName] = function(response) {
        delete window[callbackName];
        document.body.removeChild(script);
        callback(response);
      };
      
      const queryString = Object.keys(data).map(key => 
        encodeURIComponent(key) + '=' + encodeURIComponent(JSON.stringify(data[key]))
      ).join('&');
      
      const script = document.createElement('script');
      script.src = `${SCRIPT_URL}?${queryString}`;
      document.body.appendChild(script);
      
      setTimeout(() => {
        if (window[callbackName]) {
          delete window[callbackName];
          callback({ success: false, message: 'Request timeout' });
        }
      }, 30000);
    }
    
    // For this to work, you need to modify your Google Apps Script doGet() to handle JSONP
    // Add this to your code.gs doGet() function:
    /*
    function doGet(e) {
      const callback = e.parameter.callback;
      const data = JSON.parse(e.parameter.data);
      const result = processRequest(data);
      return ContentService.createTextOutput(callback + '(' + JSON.stringify(result) + ')')
        .setMimeType(ContentService.MimeType.JAVASCRIPT);
    }
    */
    
    // SIMPLER SOLUTION: Use Google Apps Script as a Web App with CORS enabled
    // Add this to your doPost() in code.gs:
    /*
    function doPost(e) {
      const result = processRequest(JSON.parse(e.postData.contents));
      return ContentService.createTextOutput(JSON.stringify(result))
        .setMimeType(ContentService.MimeType.JSON)
        .setHeader('Access-Control-Allow-Origin', '*')
        .setHeader('Access-Control-Allow-Methods', 'POST, GET, OPTIONS')
        .setHeader('Access-Control-Allow-Headers', 'Content-Type');
    }
    
    function doGet(e) {
      if (e.parameter.method === 'OPTIONS') {
        return ContentService.createTextOutput('')
          .setHeader('Access-Control-Allow-Origin', '*')
          .setHeader('Access-Control-Allow-Methods', 'POST, GET, OPTIONS')
          .setHeader('Access-Control-Allow-Headers', 'Content-Type');
      }
      return ContentService.createTextOutput(JSON.stringify({ success: true, message: 'API is running' }))
        .setMimeType(ContentService.MimeType.JSON)
        .setHeader('Access-Control-Allow-Origin', '*');
    }
    */
    
    // For now, let's use a proxy or direct fetch with proper CORS
    async function callAPI(action, data = {}) {
      if (!navigator.onLine) {
        showMessage('You are offline. Please check your connection.', 'error');
        throw new Error('Offline');
      }
      
      const payload = { action, ...data };
      console.log('Calling API:', action, payload);
      
      try {
        // Try with CORS mode first
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const result = await response.json();
        return result;
      } catch (error) {
        console.log('CORS fetch failed, trying no-cors mode...', error);
        
        // Fallback to no-cors mode (won't get response but request might work)
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          // Since we can't read response, we assume success
          return { success: true, message: 'Request sent' };
        } catch (fallbackError) {
          console.error('Both fetch attempts failed:', fallbackError);
          throw fallbackError;
        }
      }
    }
    
    // ========== LOAD LEAD ==========
    async function loadLead() {
      const code = customerCodeInput.value.trim();
      const role = roleSelect.value;
      
      if (!role) {
        showMessage('Please select a role first.', 'error');
        return;
      }
      
      if (!code) {
        showMessage('Enter customer code to load.', 'error');
        return;
      }
      
      let salesRepEmail = '';
      let salesRepPassword = '';
      
      if (role === 'SalesRep') {
        salesRepEmail = salesRepEmailAuth.value.trim();
        salesRepPassword = salesRepPasswordAuth.value.trim();
        if (!salesRepEmail || !salesRepPassword) {
          showMessage('Please enter your Sales Rep email and password.', 'error');
          return;
        }
      }
      
      loading.classList.add('show');
      
      try {
        const result = await callAPI('getLeadStatus', {
          customerCode: code,
          role: role,
          salesRepEmail: salesRepEmail,
          salesRepPassword: salesRepPassword
        });
        
        loading.classList.remove('show');
        
        if (!result || !result.success) {
          showMessage(result?.message || 'Unable to load lead. Make sure your Google Script URL is correct and deployed.', 'error');
          return;
        }
        
        currentLoadedLead = result.data;
        qualificationSelect.value = currentLoadedLead.qualification || '';
        presentationSelect.value = currentLoadedLead.presentation || '';
        kycSelect.value = currentLoadedLead.kycOnboarding || '';
        salesRepEmailInput.value = currentLoadedLead.salesRepEmail || '';
        
        // Display details
        const details = [
          ['Region', currentLoadedLead.region], ['Area', currentLoadedLead.area],
          ['Location', currentLoadedLead.location], ['Store Name', currentLoadedLead.storeName],
          ['Contact Person', currentLoadedLead.contactPerson], ['Mobile Number', currentLoadedLead.mobileNumber],
          ['Outlet Category', currentLoadedLead.outletCategory], ['Brands Stocked', currentLoadedLead.brandsStocked],
          ['Purchase Frequency', currentLoadedLead.purchaseFrequency], ['Main Supplier', currentLoadedLead.mainSupplier],
          ['Distributor Type', currentLoadedLead.distributorType], ['Weldplus Awareness', currentLoadedLead.weldplusAwareness],
          ['Additional Feedback', currentLoadedLead.additionalFeedback], ['Customer Code', currentLoadedLead.customerCode]
        ];
        
        detailsTableBody.innerHTML = details.map(([field, value]) => `
          <tr><th>${field}</th><td>${value || 'N/A'}</td></tr>
        `).join('');
        
        detailsSection.classList.remove('hidden');
        updateUiForRoleAndStatus();
        showMessage('Lead loaded successfully!', 'success');
        
      } catch (error) {
        loading.classList.remove('show');
        showMessage('Error: ' + error.message + '. Check console for details.', 'error');
        console.error('Load lead error:', error);
      }
    }
    
    // ========== SUPERVISOR VALIDATION ==========
    async function validateSupervisor(password) {
      try {
        const result = await callAPI('validateSupervisorPassword', { password: password });
        return result && result.success;
      } catch (error) {
        console.error('Validation error:', error);
        return false;
      }
    }
    
    // ========== UPDATE UI ==========
    async function updateUiForRoleAndStatus() {
      const role = roleSelect.value;
      const approval = currentLoadedLead?.approval || '';
      
      qualificationSelect.disabled = true;
      presentationSelect.disabled = true;
      kycSelect.disabled = true;
      approveBtn.style.display = 'none';
      declineBtn.style.display = 'none';
      salesRepEmailContainer.classList.add('hidden');
      salesRepAuthSection.classList.add('hidden');
      
      if (role === 'Supervisor') {
        if (!isSupervisorAuthenticated) {
          const password = prompt('Enter Supervisor Password:');
          if (password) {
            loading.classList.add('show');
            const valid = await validateSupervisor(password);
            loading.classList.remove('show');
            
            if (valid) {
              isSupervisorAuthenticated = true;
              supervisorPasswordCached = password;
              updateUiForRoleAndStatus();
              showMessage('Supervisor authenticated!', 'success');
            } else {
              showMessage('Invalid supervisor password', 'error');
              roleSelect.value = '';
            }
          } else {
            roleSelect.value = '';
          }
        } else {
          qualificationSelect.disabled = false;
          kycSelect.disabled = false;
          approveBtn.style.display = 'inline-block';
          declineBtn.style.display = 'inline-block';
          salesRepEmailContainer.classList.remove('hidden');
        }
      } else if (role === 'SalesRep') {
        salesRepAuthSection.classList.remove('hidden');
        if (approval === 'Approved') {
          presentationSelect.disabled = false;
          kycSelect.disabled = false;
        }
      }
    }
    
    // ========== APPROVE ==========
    async function approveLead() {
      if (!currentLoadedLead) { showMessage('Load a lead first', 'error'); return; }
      
      const code = customerCodeInput.value.trim();
      const qualificationValue = qualificationSelect.value;
      const salesEmail = salesRepEmailInput.value.trim();
      
      if (!qualificationValue) { showMessage('Please select a qualification status', 'error'); return; }
      
      loading.classList.add('show');
      try {
        await callAPI('updateQualificationBySupervisor', {
          customerCode: code,
          qualificationValue: qualificationValue,
          approvalAction: 'Approved',
          salesRepEmail: salesEmail,
          password: supervisorPasswordCached
        });
        showMessage('Lead approved!', 'success');
        await loadLead();
      } catch (error) {
        showMessage('Error approving lead', 'error');
      } finally {
        loading.classList.remove('show');
      }
    }
    
    // ========== DECLINE ==========
    async function declineLead() {
      if (!currentLoadedLead) { showMessage('Load a lead first', 'error'); return; }
      
      const code = customerCodeInput.value.trim();
      const qualificationValue = qualificationSelect.value;
      const salesEmail = salesRepEmailInput.value.trim();
      
      if (!qualificationValue) { showMessage('Please select a qualification status', 'error'); return; }
      
      loading.classList.add('show');
      try {
        await callAPI('updateQualificationBySupervisor', {
          customerCode: code,
          qualificationValue: qualificationValue,
          approvalAction: 'Declined',
          salesRepEmail: salesEmail,
          password: supervisorPasswordCached
        });
        showMessage('Lead declined', 'info');
        await loadLead();
      } catch (error) {
        showMessage('Error declining lead', 'error');
      } finally {
        loading.classList.remove('show');
      }
    }
    
    // ========== SUBMIT ==========
    async function handleSubmit(e) {
      e.preventDefault();
      
      const code = customerCodeInput.value.trim();
      if (!code || !currentLoadedLead) { showMessage('Load a lead first', 'error'); return; }
      
      const role = roleSelect.value;
      
      if (role === 'Supervisor') {
        if (!isSupervisorAuthenticated) { showMessage('Supervisor not authenticated', 'error'); return; }
        
        loading.classList.add('show');
        try {
          await callAPI('updateQualificationBySupervisor', {
            customerCode: code,
            qualificationValue: qualificationSelect.value,
            approvalAction: '',
            salesRepEmail: salesRepEmailInput.value.trim(),
            password: supervisorPasswordCached
          });
          showMessage('Qualification updated', 'success');
          await loadLead();
        } catch (error) {
          showMessage('Error updating', 'error');
        } finally {
          loading.classList.remove('show');
        }
      } else if (role === 'SalesRep') {
        const salesRepEmail = salesRepEmailAuth.value.trim();
        const salesRepPassword = salesRepPasswordAuth.value.trim();
        
        if (!salesRepEmail || !salesRepPassword) { showMessage('Please enter your credentials', 'error'); return; }
        
        loading.classList.add('show');
        try {
          await callAPI('updatePresentationBySalesRep', {
            customerCode: code,
            presentationValue: presentationSelect.value,
            kycValue: kycSelect.value,
            salesRepEmail: salesRepEmail,
            password: salesRepPassword
          });
          showMessage('Presentation and KYC updated', 'success');
          await loadLead();
        } catch (error) {
          showMessage('Error updating', 'error');
        } finally {
          loading.classList.remove('show');
        }
      }
    }
    
    // ========== EVENT LISTENERS ==========
    loadBtn.addEventListener('click', loadLead);
    approveBtn.addEventListener('click', approveLead);
    declineBtn.addEventListener('click', declineLead);
    roleSelect.addEventListener('change', () => {
      currentLoadedLead = null;
      detailsSection.classList.add('hidden');
      isSupervisorAuthenticated = false;
      updateUiForRoleAndStatus();
    });
    document.getElementById('leadForm').addEventListener('submit', handleSubmit);
    
    window.addEventListener('online', () => {
      offlineBanner.classList.remove('show');
      showMessage('Back online!', 'success');
    });
    window.addEventListener('offline', () => {
      offlineBanner.classList.add('show');
      showMessage('You are offline', 'info');
    });
    
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
    }
    
    showMessage('System ready. Please deploy your Google Apps Script as a Web App first.', 'info');
  </script>
</body>
</html>
